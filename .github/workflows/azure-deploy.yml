# GitHub Actions CI/CD workflow to build and deploy Undercover game to Azure App Service
name: Build and Deploy to Azure Web App

on:
  push:
    branches:
      - main    # Trigger deployment on push to the main branch
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'undercoverplay'   # REPLACE THIS with your actual Azure App Service name
  NODE_VERSION: '20.x'                        # Node version to build and run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build React Client (Vite)
        run: npm run build

      - name: Package Production Files
        # We zip only files required in production: 
        # package files, backend server, React compiled assets (dist/), and words database (src/words.js)
        run: |
          zip -r release.zip package.json package-lock.json server.js dist/ src/words.js

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: 'Production'
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Decompress Artifact
        run: unzip release.zip && rm release.zip

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
